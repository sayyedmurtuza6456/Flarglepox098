<!DOCTYPE html>
<html>
<head>
    <title>Test Mobile Info & Location</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #f3f3f3; padding-top: 50px; }
        .container { background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); display: inline-block; width: 90%; max-width: 400px; }
        .btn { background: #4CAF50; color: white; padding: 12px 30px; font-size: 18px; font-weight: bold; cursor: pointer; border-radius: 5px; width: 100%; border: none; }
        .btn:hover { background: #45a049; }
    </style>
</head>
<body>

<div class="container">
    <h3>Test Mobile Info & Location</h3>
    <p>Click below to allow and send your mobile info + location</p>
    <button id="sendBtn" class="btn">Allow & Send</button>
</div>

<script>
const serverURL = "/log-info"; // Local server endpoint

async function sendData() {
    try {
        const platform = navigator.platform;
        const userAgent = navigator.userAgent;
        const language = navigator.language;
        const languages = navigator.languages;
        const online = navigator.onLine;
        const ram = navigator.deviceMemory || 0;
        const cpuCores = navigator.hardwareConcurrency || 0;
        const screenRes = `${screen.width}x${screen.height}`;
        const colorDepth = screen.colorDepth;
        const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
        const battery = await navigator.getBattery();
        let latitude = null, longitude = null;

        // Geolocation
        if (navigator.geolocation) {
            await new Promise((resolve, reject) => {
                navigator.geolocation.getCurrentPosition(pos => {
                    latitude = pos.coords.latitude;
                    longitude = pos.coords.longitude;
                    resolve();
                }, err => resolve()); // ignore if denied
            });
        }

        const payload = {
            userAgent, platform, language, languages, online,
            ram, cpuCores, screenRes, colorDepth, timezone,
            batteryLevel: battery.level * 100, isCharging: battery.charging,
            latitude, longitude
        };

        // Send to server
        await fetch(serverURL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        });

        alert("✅ Data sent successfully!");
    } catch (err) {
        console.error(err);
        alert("❌ Error sending data.");
    }
}

document.getElementById("sendBtn").addEventListener("click", sendData);
</script>

</body>
</html>
