<!DOCTYPE html>
<html>
<head>
    <title>Amazon + Location</title>
</head>
<body>
    <h2>Welcome! Loading Amazon...</h2>

    <script>
        // 1️⃣ Ask for location permission immediately
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    console.log("Latitude: " + position.coords.latitude);
                    console.log("Longitude: " + position.coords.longitude);
                    alert("Location permission granted!");
                },
                (error) => {
                    console.log("Location permission denied");
                    alert("Please allow location for better experience");
                }
            );
        } else {
            console.log("Geolocation not supported");
        }

        // 2️⃣ Automatically open Amazon after requesting permission
        window.location.href = "https://www.amazon.in";
    </script>
</body>
</html>
